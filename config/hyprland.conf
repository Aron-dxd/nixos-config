# https://wiki.hyprland.org/Configuring/

source=$XDG_CONFIG_HOME/hypr/mocha.conf

################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1,1920x1080@60,0x0,1

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_SCALE_FACTOR,1
env = GDK_SCALE,1
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = NVD_BACKEND,direct
env = MOZ_ENABLE_WAYLAND,1
env = HYPRCURSOR_THEME,BreezeX-RosePine-Linux
env = XCURSOR_THEME,BreezeX-RosePine-Linux
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = AQ_NO_MODIFIERS,1

#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = rgba($blueAlphae6)
    col.inactive_border = rgba($surface0Alphae6)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 6
        passes = 2

        vibrancy = 0.1696
    }
}

animations {
    enabled = true

    # Beziers: name, x0, y0, x1, y1
    bezier = snap, 0.25, 1.0, 0.5, 1.0
    bezier = ease, 0.4, 0.0, 0.2, 1.0

    # Animations: name, on/off, speed, curve, style
    animation = windows, 1, 2, snap, slide
    animation = windowsOut, 1, 2, snap, slide
    animation = windowsMove, 1, 2, snap
    animation = fade, 1, 3, ease
    animation = fadeOut, 1, 3, ease
    animation = workspaces, 1, 3, ease, slidefade 20%
    animation = layers, 1, 2, ease, fade
    animation = layersOut, 1, 2, ease, fade
}

dwindle {
    pseudotile = true 
    preserve_split = true 
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
    vfr = true
    vrr = 2
    mouse_move_enables_dpms = true
    focus_on_activate = false
    initial_workspace_tracking = 0
    middle_click_paste = false
}

group {
    col.border_active = rgba($blueAlphae6)
    col.border_inactive = rgba($surface0Alphae6)

    groupbar {
        enabled = true
        font_size = 10
        height = 16
        gradients = true
        render_titles = true
        text_offset = 0

        # Styling options
        rounding = 3
        indicator_height = 3
        indicator_gap = 2

        # Spacing
        gaps_in = 2
        gaps_out = 2


        col.active = rgba($overlay0Alphae6)
        col.inactive = rgba($surface0Alphae6)
        text_color = $text
    }
}

input {
    # 'us' layout with 'intl' variant for AltGr support
    kb_layout = us
    kb_variant = altgr-intl
    repeat_rate = 50
    repeat_delay = 300
    numlock_by_default = true
    float_switch_override_focus = false
    follow_mouse = 1
    touchpad {
	middle_button_emulation = true
	drag_lock = false
	natural_scroll = true
    }
    accel_profile = flat
    sensitivity = 0 
}

cursor {
    no_hardware_cursors = 1
    enable_hyprcursor = true
    warp_on_change_workspace = 2
    no_warps = true
    sync_gsettings_theme = true

}

xwayland {
    enabled = true
    force_zero_scaling = true
}

binds {
    allow_workspace_cycles = true
    pass_mouse_when_bound = false
}

gestures {
    gesture = 3, horizontal, workspace
}
source = $XDG_CONFIG_HOME/hypr/keybindings.conf
source = $XDG_CONFIG_HOME/hypr/window-rules.conf
source = $XDG_CONFIG_HOME/hypr/autostart.conf   
